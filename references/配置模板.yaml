# 配置模板 — 飞书多Agent群聊通信
# ⚠️ 使用前必须将下方占位符替换为实际值，然后运行 scripts/validate_config.py 校验

# 一、飞书群信息
group_id: "oc_你的群ID"
group_name: "你的群名"

# 二、Bot 身份配置
bots:
  a:
    name: "你的bot_a名字"           # 主持者，在群里显示的名字
    open_id: "ou_你的open_id"
    role: "主持者"
    responsibilities:
      - "接收用户指令"
      - "分析任务、拆解步骤"
      - "@执行者派发具体操作"
      - "把关合规、审核结果"
  b:
    name: "你的bot_b名字"           # 执行者，在群里显示的名字
    open_id: "ou_你的open_id"
    role: "执行者"
    responsibilities:
      - "接收主持者@的任务"
      - "执行操作"
      - "完成后@主持者汇报"

# 三、Bot 之间 @ 用的 ID 对照
# 主持者 @ 执行者 → 填 bot_b 的 open_id
# 执行者 @ 主持者 → 填 bot_a 的 open_id
